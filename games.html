<style>

* {
    margin:0;
    padding:0;
    box-sizing:border-box;
}


body {

    min-height:100vh;

    overflow-x:hidden;

    font-family:Arial, sans-serif;

    color:white;

    background-image:url("mmmdonuts.png");

    background-size:cover;

    background-position:center;

    background-attachment:fixed;

}


body::before {

    content:"";

    position:fixed;

    inset:0;

    background:rgba(0,0,0,.65);

    z-index:-1;

}


/* Logo */

.logo {

    position:absolute;

    top:20px;

    left:20px;

}


.logo img {

    width:48px;

    height:48px;

}





/* Social icons */

.socials {

    position:absolute;

    top:20px;

    right:20px;

    display:flex;

    gap:15px;

}


.socials img {

    width:48px;

    height:48px;

}





/* Navigation */

.nav {

    position:fixed;

    top:20px;

    left:50%;

    transform:translateX(-50%);


    display:flex;

    gap:10px;


    background:rgba(0,0,0,.65);

    padding:10px 15px;

    border-radius:20px;

    -webkit-backdrop-filter:blur(10px);

    backdrop-filter:blur(10px);

}


.nav a {

    color:white;

    text-decoration:none;

    background:#222;

    padding:10px 15px;

    border-radius:12px;

    transition:.2s;

}


.nav a:hover {

    background:#dbde0a;

    color:black;

}





/* Title */

.hero {

    text-align:center;

    padding-top:130px;

}


.big {

    font-size:75px;

}


.cheese {

    color:#dbde0a;

}





/* Cards */

.grid {

    width:90%;

    max-width:1200px;

    margin:60px auto;


    display:grid;

    grid-template-columns:
    repeat(auto-fit,minmax(250px,1fr));


    gap:25px;

}



.card {

    background:rgba(17,17,17,.85);

    border:2px solid #333;

    border-radius:20px;

    padding:25px;


    transition:.25s;

}



.card:hover {

    transform:translateY(-8px);

    border-color:#dbde0a;

}



.card h2 {

    margin-bottom:15px;

}



.card p {

    color:#ccc;

}





.card a {

    display:inline-block;

    margin-top:20px;

    padding:10px 20px;

    background:#dbde0a;

    color:black;

    text-decoration:none;

    border-radius:10px;

    font-weight:bold;

}





@media(max-width:700px){


.big {

    font-size:42px;

}


.nav {

    top:80px;

    max-width:95vw;

    overflow-x:auto;

}


.nav a {

    font-size:12px;

    padding:8px;

}


.socials img,
.logo img {

    width:36px;

    height:36px;

}


.hero {

    padding-top:150px;

}


}

</style>
